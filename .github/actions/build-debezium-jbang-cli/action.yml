name: "Build Debezium JBang CLI"
description: "Builds the Debezium JBang CLI"

inputs:
  maven-cache-key:
    description: "The maven build cache key"
    required: true
  shell:
    description: "The shell to use"
    required: false
    default: bash
runs:
  using: "composite"
  steps:
    - uses: ./.github/actions/setup-java
    - name: Set up JBang
      uses: jbangdev/setup-jbang@main
    - uses: ./.github/actions/maven-cache
      with:
        key: ${{ inputs.maven-cache-key }}
    - name: Build Parent
      shell: ${{ inputs.shell }}
      run: >
        ./mvnw clean install -DskipITs -DskipTests -B
    - name: Build Debezium JBang CLI (native)
      shell: ${{ inputs.shell }}
      run: >
        ./mvnw clean install -B -pl :debezium-jbang -am -amd -DskipITs=false -Pnative
    - name: Build Debezium JBang CLI (JBang)
      shell: ${{ inputs.shell }}
      run: >
        ./mvnw clean install -B -pl :debezium-jbang -am -amd -DskipJBs=false